<!DOCTYPE html>
<html
        lang="es"
        xmlns:th="http://www.thymeleaf.org"
        th:replace="~{layout/base :: masterLayout(~{::title}, ~{}, ~{::.content}, ~{})}">
<head>
    <title>Panel de administración</title>
</head>
<body>

<div class="content container my-5">
    <h1 class="my-2">Opciones disponibles</h1>

    <div class="card border-0 shadow-sm text-center w-25 product-card">
        <div class="card-body py-5">
            <i class="bi bi-box" style="font-size: 3.5rem;"></i>
            <h5 class="card-title mt-3 fw-bold text-dark">Productos</h5>
            <p class="text-muted small mb-0">Gestionar catálogo e inventario</p>
            <a th:href="@{/admin/products}" class="stretched-link"></a>
        </div>
    </div>
</div>

</body>
</html>
