<header th:fragment="headerFragment">
    <nav class="navbar navbar-expand-lg navbar-dark bg-black">
        <div class="container">
            <a class="navbar-brand" th:href="@{/}" th:text="${appName}">App</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                    aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <!-- INICIO-->
                    <li class="nav-item">
                        <a id="nav-index" class="nav-link" aria-current="page"
                           th:classappend="${requestURI == '/' ? 'actual-page' : ''}"
                           th:href="@{/}">Inicio</a>
                    </li>

                    <!-- PRODUCTOS-->
                    <li class="nav-item">
                        <a id="nav-product" class="nav-link"
                           th:classappend="${requestURI.startsWith('/products') ? 'actual-page' : ''}"
                           th:href="@{/products}"
                           sec:authorize="isAuthenticated()">
                            Productos
                        </a>
                    </li>

                    <!--PANEL DE ADMINISTRACIÓN: SOLO ADMIN-->
                    <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                        <a class="nav-link"
                           th:classappend="${requestURI.startsWith('/admin') ? 'actual-page' : ''}"
                           th:href="@{/admin}">Administración</a>
                    </li>
                </ul>

                <ul class="navbar-nav ms-auto">
                    <!--LOGIN-->
                    <li class="nav-item" sec:authorize="isAnonymous()">
                        <a class="nav-link"
                           th:classappend="${requestURI == '/login' ? 'actual-page' : ''}"
                           th:href="@{/login}">Ingresar</a>
                    </li>
                    <!--REGISTRO-->
                    <li class="nav-item" sec:authorize="isAnonymous()">
                        <a class="nav-link"
                           th:classappend="${requestURI == '/signup' ? 'actual-page' : ''}"
                           th:href="@{/signup}">Registrarme</a>
                    </li>

                    <!-- CARRITO: SOLO SE MUESTRA AUTENTICADO -->
                    <li class="nav-item" sec:authorize="isAuthenticated()">
                        <a th:href="@{/cart}" class="btn text-white">
                            <i class="bi bi-cart ">
                                <span th:if="${cartItemCount > 0}"
                                      th:text="${cartItemCount}"
                                      class="badge text-bg-secondary"
                                >1</span>
                            </i>
                        </a>
                    </li>

                    <!-- CIERRE DE SESIÓN-->
                    <li class="nav-item d-flex align-items-center" sec:authorize="isAuthenticated()">
                        <form th:action="@{/logout}" method="post" class="m-0">
                            <button type="submit" class="nav-link btn btn-link">
                                Cerrar sesión
                            </button>
                        </form>
                    </li>


                </ul>
            </div>
        </div>

    </nav>

</header>
