<!DOCTYPE html>
<html
        lang="es"
        xmlns:th="http://www.thymeleaf.org"
        th:replace="~{layout/base :: masterLayout(~{::title}, ~{}, ~{::.content}, ~{})}">
<head>
    <title>Productos</title>
</head>
<body>

<div class="content">
    <section class="container my-5">
        <h1>Listado de productos</h1>

        <div class="row mt-5 gap-3 justify-content-center">
            <article class="col-12 col-md-6 col-lg-3" th:each="product: ${products}">
                <a th:href="@{/products/{id}(id = ${product.id})}"
                   class="card p-0 product-card h-100 text-decoration-none text-dark d-flex flex-column">

                    <img th:src="${product.urlImage}"
                         class="card-img-top product-card-img"
                         th:alt="${product.name}"
                    />
                    <div class="card-body d-flex flex-column">
                        <h5 class="card-title" th:text="${product.name}"></h5>
                        <p class="card-text" th:text="${product.shortDescription}"></p>

                        <div class="mt-auto text-start">
                            <strong th:text="${#numbers.formatCurrency(product.price)}">$0.00</strong>
                        </div>
                    </div>
                </a>
            </article>
        </div>
    </section>
</div>

</body>
</html>
